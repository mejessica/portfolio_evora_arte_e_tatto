<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Évora — Arte & Tattoo · Canasvieiras</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,400&family=Caveat:wght@400;600&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <header>
    <nav class="nav">
      <a href="../index.html" class="logo">Évora — Arte & Tattoo</a>
      <div class="nav-links">
        <a href="../index.html" class="nav-a nav-galeria">Galeria</a>
        <a href="./sobre.html" class="nav-a nav-sobre">Sobre</a>
        <a href="./encomendar.html" class="nav-a nav-encomendar cta">Encomendar</a>
      </div>
    </nav>
  </header>
  <main>
    <div id="encomendar">
      <div class="contato-sec">
        <div>
          <h2>Vamos criar<br><em>juntos?</em></h2>
          <p>Cada encomenda começa com uma conversa. Conta sua ideia e Évora transforma em algo único.</p>
          <div class="links">
            <div class="link-item">
              <div class="link-info"><small>Ateliê</small><span>Canasvieiras, Florianópolis</span></div>
            </div>
            <div class="link-item">
              <div class="link-info"><small>Instagram</small><span>@evora.n.tattoo & @evora.n.arte</span></div>
            </div>
            <div class="link-item">
              <div class="link-info"><small>Atendimento</small><span>(48) 99999-9999</span></div>
            </div>
          </div>
        </div>
        <div class="form-box">
            <!-- Formulário de contato -->
          <h3>Solicite um orçamento</h3>
          <div class="input-form">
            <label>Nome</label>
            <input type="text" placeholder="Como você se chama?">
          </div>
          <div class="input-form">
            <label>Tipo de trabalho</label>
            <select>
              <option value="">Selecione...</option>
              <option>Aquarela personalizada</option>
              <option>Tattoo</option>
              <option>Retrato</option>
              <option>Mural</option>
              <option>Acrílico</option>
            </select>
          </div>
          <div class="input-form">
            <label>Sua ideia</label>
            <textarea placeholder="Me conta o que você imagina..."></textarea>
          </div>
          <div class="input-form">
            <label>WhatsApp ou e-mail</label>
            <input type="text" placeholder="Para entrar em contato">
          </div>
          <button class="submit">Enviar solicitação ✦</button>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
